<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#0B0F19"/>
  
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0B0F19" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  
  <circle cx="256" cy="256" r="140" fill="url(#glow)"/>
  
  <!-- Stylized 4-pointed Spark Star (Slightly smaller for safe zone) -->
  <path d="M 256,140 C 256,210 210,256 140,256 C 210,256 256,302 256,372 C 256,302 302,256 372,256 C 302,256 256,210 256,140 Z" fill="url(#starGrad)"/>
  
  <!-- Core Highlight -->
  <circle cx="256" cy="256" r="8" fill="#FFFFFF"/>
</svg>
